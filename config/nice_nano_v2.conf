# NICE NANO V2 配置 | 仅使用ZMK官方定义的Kconfig项
CONFIG_ZMK_KEYBOARD_NAME="My16Key-OLED"

# 核心：直键扫描（仅保留官方配置，删除无效项）
CONFIG_ZMK_KSCAN=y
CONFIG_ZMK_KSCAN_DIRECT_POLLING=n # 直键轮询模式，默认关闭（中断模式）

# 显示配置 | 严格遵循官方Display Kconfig规范
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y # SSD1306官方默认，手动开启提升兼容性
CONFIG_SSD1306FB=y # SSD1306驱动
CONFIG_I2C=y # I2C总线（OLED用）

# 串口/调试配置 | 官方最小配置，无多余项
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3 # INFO级别，平衡日志和功耗

# 蓝牙+功耗 | 官方标准配置
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_IDLE_TIMEOUT=300 # 5分钟休眠，官方推荐