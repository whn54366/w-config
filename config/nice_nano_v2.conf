# 基础配置
CONFIG_ZMK_KEYBOARD_NAME="My 14Key Keeb"  # 键盘名称
CONFIG_CONSOLE=y                          # 启用控制台（调试用，可关闭）
CONFIG_SERIAL=y                           # 启用串口

# OLED 显示配置
CONFIG_ZMK_DISPLAY=y                      # 启用ZMK显示功能
CONFIG_ZMK_DISPLAY_128X64=y               # 适配128x64 OLED
CONFIG_SSD1306FB=y                        # 启用SSD1306驱动
CONFIG_I2C=y                              # 启用I2C总线

# 键盘扫描配置
CONFIG_ZMK_KSCAN=y                        # 启用键盘扫描
CONFIG_ZMK_KSCAN_GPIO_MATRIX=y            # 启用GPIO矩阵扫描
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=20     # 按下防抖
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=20   # 释放防抖

# 功耗优化（NICE NANO 蓝牙）
CONFIG_BT=y                               # 启用蓝牙
CONFIG_BT_PERIPHERAL=y                    # 蓝牙从机模式
CONFIG_ZMK_BLE=y                          # 启用ZMK蓝牙
CONFIG_ZMK_SPLIT=y                        # 若为分体键盘启用（单键盘可注释）
CONFIG_ZMK_IDLE_TIMEOUT=300               # 5分钟无操作休眠

# 调试配置（可选）
CONFIG_LOG=y                              # 启用日志
CONFIG_LOG_DEFAULT_LEVEL=3                # 日志级别：3=INFO