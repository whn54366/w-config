# 自制键盘基础配置（参考 Contra）
CONFIG_ZMK_KEYBOARD_NAME="My-DIY-Keyboard"
CONFIG_ZMK_SETTINGS=y

# 核心：GPIO 直接按键（一个 IO 一个按键）
CONFIG_ZMK_KSCAN=y
CONFIG_ZMK_KSCAN_GPIO_DIRECT=y
CONFIG_ZMK_KSCAN_MATRIX=n

# 有线+蓝牙双模式（参考 Contra）
CONFIG_USB_DEVICE_HID=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_CONN_INTERVAL_MS=20
CONFIG_ZMK_IDLE_TIMEOUT_MS=300000

# 性能优化（格斗键盘级）
CONFIG_ZMK_DEBOUNCE_PERIOD_MS=5
CONFIG_ZMK_SCAN_PERIOD_MS=1

# ========== SSD1306 0.96寸 OLED 配置 ==========
CONFIG_I2C=y
CONFIG_I2C_0=y
CONFIG_I2C_0_SDA_PIN=17
CONFIG_I2C_0_SCL_PIN=20
CONFIG_I2C_0_BAUDRATE=400000

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_SSD1306=y
CONFIG_SSD1306_DEFAULT=y
CONFIG_SSD1306_HEIGHT=64
CONFIG_SSD1306_WIDTH=128
CONFIG_SSD1306_ROTATION=0

# 调试日志
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_CONSOLE=y