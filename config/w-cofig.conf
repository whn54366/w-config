# ========== 基础必需（Contra + NICE!NANO V2 标准）==========
CONFIG_ZMK_KEYBOARD_NAME="Contra Nano"
CONFIG_ZMK_SETTINGS=y

CONFIG_ZMK_DEBOUNCE_PERIOD_MS=5
CONFIG_ZMK_SCAN_PERIOD_MS=1

CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_CONN_INTERVAL_MS=20
CONFIG_ZMK_IDLE_TIMEOUT_MS=300000

# ========== 按键矩阵（Contra 标准，绝对不会不响应）==========
CONFIG_ZMK_KSCAN=y
CONFIG_ZMK_KSCAN_MATRIX=y
CONFIG_ZMK_KSCAN_GPIO_POLLING=n

# ========== 你要的 I2C LED(17,20) ==========
CONFIG_I2C=y
CONFIG_I2C_0=y
CONFIG_I2C_0_SDA_PIN=17
CONFIG_I2C_0_SCL_PIN=20
CONFIG_I2C_0_BAUDRATE=400000

# LED 先开基础，不搞复杂（避免崩）
CONFIG_ZMK_LEDS=y