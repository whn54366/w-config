# ========== 基础配置（保留之前的格斗键盘优化） ==========
# 性能优化：格斗键盘响应速度
CONFIG_ZMK_DEBOUNCE_PERIOD_MS=5
CONFIG_ZMK_SCAN_PERIOD_MS=1
CONFIG_ZMK_IDLE_TIMEOUT_MS=300000

# 蓝牙优化：NICE!NANO V2 续航+响应
CONFIG_ZMK_BLE_CONN_INTERVAL_MS=20
CONFIG_ZMK_BLE_POWER_MODE_LOW_POWER=y

# ========== I2C 核心配置（关键！启用17/20管脚） ==========
# 启用 Nordic TWI(I2C) 外设（NICE!NANO V2 基于nRF52840）
CONFIG_I2C=y
CONFIG_NRF_TWI_ENABLED=y

# 指定 I2C 总线0（对应NICE!NANO V2的TWI0）
CONFIG_I2C_0=y
CONFIG_NRF_TWI0_ENABLED=y

# 配置 I2C 管脚（17=SDA，20=SCL）
# 管脚编号规则：P1.00=17 → 编码为 1*32 + 0 = 32；P0.13=20 → 编码为 0*32 +13=13
CONFIG_I2C_0_SDA_PIN=32    # 对应NICE!NANO V2的17脚（P1.00）
CONFIG_I2C_0_SCL_PIN=13    # 对应NICE!NANO V2的20脚（P0.13）

# I2C 速率（匹配LED模块）
CONFIG_I2C_0_BAUDRATE=400000  # 400kHz高速模式（大多数I2C LED支持）

# ========== LED 相关配置 ==========
# 启用ZMK LED子系统
CONFIG_ZMK_LEDS=y
# 启用层指示LED功能
CONFIG_ZMK_LED_LAYER_INDICATOR=y
# 启用按键反馈LED功能
CONFIG_ZMK_LED_KEY_INDICATOR=y

# ========== 禁用冲突功能（关键！） ==========
# 确保17/20管脚不被其他功能占用
CONFIG_ZMK_KSCAN_GPIO_POLLING=n  # 禁用GPIO扫描（避免占用I2C管脚）
CONFIG_NRF_GPIO_AS_PINRESET=n    # 禁用管脚复位功能