# ========== 基础配置（有线+蓝牙双支持）==========
CONFIG_ZMK_KEYBOARD_NAME="Contra-Nano-GPIO"
CONFIG_ZMK_SETTINGS=y

# 性能优化（格斗键盘）
CONFIG_ZMK_DEBOUNCE_PERIOD_MS=5
CONFIG_ZMK_SCAN_PERIOD_MS=1
CONFIG_ZMK_IDLE_TIMEOUT_MS=300000

# 蓝牙+有线双支持
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_CONN_INTERVAL_MS=20
CONFIG_USB_DEVICE_HID=y  # 启用USB有线HID
CONFIG_USB_CDC_ACM=y     # 启用USB串口（调试用）

# ========== 关键：禁用矩阵扫描，启用GPIO直接按键 ==========
CONFIG_ZMK_KSCAN=y
CONFIG_ZMK_KSCAN_MATRIX=n  # 禁用矩阵扫描（核心！）
CONFIG_ZMK_KSCAN_GPIO_DIRECT=y  # 启用GPIO直接映射

# ========== I2C LED（17/20引脚，先保留基础启用）==========
CONFIG_I2C=y
CONFIG_I2C_0=y
CONFIG_I2C_0_SDA_PIN=17
CONFIG_I2C_0_SCL_PIN=20
CONFIG_I2C_0_BAUDRATE=400000
CONFIG_ZMK_LEDS=y

# 调试（可选，能看日志）
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_CONSOLE=y